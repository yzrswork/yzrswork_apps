    width: 24px;
    height: 24px;

    background: var(--terracotta);

  @media (max-width: 480px) {
    .page { padding: 22px 16px 36px; }

  }
</style>

<script>
/* =========================================================
   直し方ナビ — Fix-it Navigator
   依存ゼロの単一HTML。データ送信なし、オフライン動作。
   よくあるトラブルを「質問に答えるだけ」で切り分ける診断ウィザード。
   決定木はTREESに定義。元記事から #yahoo-mail / #win-share で直リンク可。
   ========================================================= */

/* ---------- 決定木データ ----------
   node.type: 'question'（選択肢で分岐）/ 'solution'（最終手順）
   共通: text, help?, warn?, steps?[], links?[{label,url}], affiliate?{keyword,label,note}, options[{label,next,style?}]
   特殊next: '__home'（メニューへ戻る）
*/
const TREES = {
  'yahoo-mail': {
    num: '01',
    title: 'iPhoneでYahoo!メールが急に使えない',
    sub: '「パスワードが正しくありません」と出る／IMAP・SMTP設定の直し方',
    article: { label: '元記事（note）', url: 'https://note.com/yzrswork/n/n1b799d6967c5' },
    start: 'y0',
    nodes: {
      y0: {
        type: 'question',
        text: 'iPhoneの標準メールで、Yahoo!メールが急に送受信できなくなりましたか？',
        help: '2026年2月26日に、Yahoo!が不正ログイン対策でサードパーティ製メールアプリの接続をデフォルト遮断しました。心当たりがなくても、これが主な原因です。',
        options: [
          { label: 'はい（パスワードは変えていない）', next: 'y1' },
          { label: 'パスワード自体を忘れた／変えた', next: 'yAcct' },
          { label: 'メールソフトのIMAP/SMTP設定値が知りたい', next: 'ySettings', style: 'ghost' },
          { label: '症状がちょっと違う', next: 'yOther', style: 'ghost' }
        ]
      },
      ySettings: {
        type: 'solution',
        text: 'メールソフトのサーバ設定値（IMAP / SMTP / POP）',
        text2: 'iPhone標準メール以外（Thunderbird等）で設定する場合の値です。先にPC側で「IMAP/POP/SMTPアクセス」を有効化しておく必要があります。',
        steps: [
          '受信 IMAP: <code>imap.mail.yahoo.co.jp</code> ／ ポート <code>993</code> ／ SSL(SSL/TLS) 有効',
          '受信 POP: <code>pop.mail.yahoo.co.jp</code> ／ ポート <code>995</code> ／ SSL 有効',
          '送信 SMTP: <code>smtp.mail.yahoo.co.jp</code> ／ ポート <code>465</code> または <code>587</code> ／ SSL 有効・認証あり',
          '2段階認証を使っている場合は「アプリパスワード」を発行して使う',
          'つながらない時は、先にアクセス許可（IMAP/SMTPを「利用する」）を確認'
        ],
        help: 'サーバ値は変わることがあります。最新はYahoo!メール公式ヘルプでも確認してください。',
        options: [
          { label: 'アクセス許可の設定手順へ', next: 'y3', style: 'primary' },
          { label: '最初に戻る', next: '__home', style: 'ghost' }
        ]
      },
      yAcct: {
        type: 'solution',
        text: 'それはアカウント側の問題です',
        steps: [
          'ブラウザで Yahoo! JAPAN にアクセスし、ID／パスワードを再設定する',
          '何度もパスワードを間違えてロックされている場合は、しばらく時間を置いてから再試行する',
          'パスワードが確定したら、このナビの最初に戻ってメール設定を確認する'
        ],
        options: [{ label: '最初に戻る', next: '__home', style: 'ghost' }]
      },
      yOther: {
        type: 'solution',
        text: 'このナビはYahoo!のIMAP/SMTP遮断トラブル向けです',
        text2: '症状が違う場合は、元記事に他の手がかりがあるかもしれません。',
        options: [{ label: '最初に戻る', next: '__home', style: 'ghost' }]
      },
      y1: {
        type: 'question',
        text: 'まず落ち着いてください。先にやることがあります。',
        warn: '焦ってパスワードを何度も入れると、Yahoo! JAPAN IDが一時的にロックされます。iPhoneのダイアログはいったんキャンセルして、先にPCで設定を変えます。',
        options: [{ label: '了解。次へ', next: 'y2', style: 'primary' }]
      },
      y2: {
        type: 'question',
        text: 'PCのブラウザでYahoo!メールにログインできますか？',
        options: [
          { label: 'できる', next: 'y3' },
          { label: 'PCがない（スマホだけ）', next: 'y2b' },
          { label: 'そもそもログインできない', next: 'yAcct' }
        ]
      },
      y2b: {
        type: 'question',
        text: 'スマホのブラウザでも設定できます',
        steps: [
          'Safari等で mail.yahoo.co.jp を開く',
          'ページ下部などから「PC版」表示に切り替える',
          'PCと同じ設定画面が出れば、そのまま次の手順へ'
        ],
        options: [{ label: 'PC版表示にできた。次へ', next: 'y3', style: 'primary' }]
      },
      y3: {
        type: 'question',
        text: 'PC側でIMAPとSMTPを有効にします',

          'iPhone版Obsidianを再起動して再スキャン',
          'PCで金庫アイコンからVaultのパスが正しい場所か確認'
        ],
        options: [
          { label: '直った', next: 'oWin', style: 'primary' },
          { label: 'まだ変', next: 'oStuck' }
        ]
      },
      oStuck: {
        type: 'solution',
        text: 'それでも不整合が残るなら',
        steps: [
          '雲マーク（ストレージ最適化）をオフにし、ファイルを常にローカルに実体化させる',
          'iOSのファイルアプリで実体がダウンロード済みか確認',
          '最後の手段として Apple ID 再ログインをもう一度試す'
        ],
        links: [{ label: '元記事で詳しく読む', url: 'https://note.com/yzrswork/n/nbdf94c650c6c' }],
        options: [{ label: '最初に戻る', next: '__home', style: 'ghost' }]
      },
      oWin: {
        type: 'solution',
        text: '同期できました。おつかれさまでした。',
        text2: 'ポイントは「iPhone側でStore in iCloudを先行」「雲マーク最適化を避けてローカル実体化」「理屈で直らない時はApple ID再ログイン」の3つ。',
        links: [{ label: '元記事を見る', url: 'https://note.com/yzrswork/n/nbdf94c650c6c' }],
        options: [{ label: '最初に戻る', next: '__home', style: 'ghost' }]
      }
    }
  }
};

/* ---------- 状態 ---------- */
const appEl = document.getElementById('app');
let current = null;       // { treeId, nodeId }
let stack = [];
let lockedTree = null;

function goHome() {
  if (lockedTree) {
    stack = [];
    go(lockedTree, TREES[lockedTree].start, false);
  } else {
    renderHome();
  }
}
function updateFooterVisibility() {
  var el = document.getElementById('footer-parent-link');
  if (el) el.style.display = lockedTree ? 'none' : '';
}

/* ---------- ユーティリティ ---------- */
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
// stepsとhelpは<code>タグを意図的に含むので、エスケープせずそのまま使う（データは内製・固定）
function amazonUrl(keyword) {
  const tag = localStorage.getItem('fixit:amazonTag') || 'yzrs_apps-22';
  const base = 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(keyword);
  return tag ? base + '&tag=' + encodeURIComponent(tag) : base;
}

/* ---------- レンダリング ---------- */
function renderHome() {
  lockedTree = null;
  current = null;
  stack = [];
  if (location.hash) history.replaceState(null, '', location.pathname);
  updateFooterVisibility();

  let cards = '';
  Object.keys(TREES).forEach((id) => {
    const t = TREES[id];
    cards += `
      <li>
        <button class="menu-card" data-tree="${id}">
          <span class="mc-num">${t.num}</span>
          <div class="mc-title">${esc(t.title)}</div>
          <div class="mc-sub">${esc(t.sub)}</div>
          <span class="mc-go">診断をはじめる →</span>
        </button>
      </li>`;
  });

  appEl.innerHTML = `
    <header class="hero">
      <h1>直し方ナビ<span class="en">— Fix-it Navigator</span></h1>
      <p>「何もしてないのに急に繋がらない」よくあるトラブルを、質問に答えるだけで切り分けます。オフラインでも動きます。</p>
    </header>
    <div class="section-label">— 診断メニュー</div>
    <ul class="menu">${cards}</ul>
    <section class="about">
      <p>ここに並んでいる診断は、どれも、や印工務店が実際に踏んだトラブルの記録から作っています。ある日いきなりiPhoneのYahoo!メールに「パスワードが正しくありません」と出て、調べたらYahoo!側が不正ログイン対策でサードパーティ製メールアプリの接続を止めた新仕様だった話。Windows 11を24H2にした途端に社内の共有フォルダが見えなくなり、半日格闘した末に「資格情報の手動登録が必須になった」という仕様変更にたどり着いた話。組み上げた自作PCがビープ音を鳴らして起動せず、高いパーツを疑う前にケーブルやモニター側から順に切り分けるべきだったと学んだ話。ObsidianとiCloudの同期がiPhone側で固まった話。トラブルの渦中では長い記事を読む余裕がないので、質問に答えていくだけで原因を絞り込めるように、それぞれの記事の切り分け手順をナビ形式に組み直しました。各診断の最後から、経緯と全手順をまとめた元記事に飛べます。</p>
    </section>`;

  appEl.querySelectorAll('.menu-card').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-tree');
      startTree(id);
    });
  });
}

function startTree(treeId) {
  const tree = TREES[treeId];
  if (!tree) { renderHome(); return; }
  stack = [];
  location.hash = treeId;          // 共有・ブックマーク用
  go(treeId, tree.start, false);
}

function go(treeId, nodeId, push) {
  if (nodeId === '__home') { goHome(); return; }
  const tree = TREES[treeId];
  const node = tree && tree.nodes[nodeId];
  if (!node) { goHome(); return; }
  if (push && current) stack.push({ ...current });
  current = { treeId, nodeId };
  renderNode(tree, node);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderNode(tree, node) {
  const isSolution = node.type === 'solution';
  const isWinTerminal = node.affiliate || (node.options && node.options.some(o => o.next === 'wNas'));
  const kicker = isSolution ? '解決手順' : '質問';
  let cls = 'card';
  if (isSolution) cls += ' solution';
  if (node.affiliate) cls += ' win';

  let html = `
    <div class="crumb">
      <button class="back" id="backBtn">← 戻る</button>
      <span class="now">${esc(tree.title)}</span>
    </div>
    <div class="${cls}">
      <div class="kicker">${kicker}</div>
      <p class="qtext">${node.text}</p>`;

  if (node.text2) html += `<p style="font-size:14px;color:var(--ink-soft);margin:0 0 14px;">${esc(node.text2)}</p>`;
  if (node.warn) html += `<div class="warn">${esc(node.warn)}</div>`;
  if (node.help) html += `<div class="help">${node.help}</div>`;

  if (node.steps && node.steps.length) {
    html += '<ol class="steps">';
    node.steps.forEach((s) => { html += `<li>${s}</li>`; });
    html += '</ol>';
  }

  // 選択肢
  if (node.options && node.options.length) {
    html += '<div class="options">';
    node.options.forEach((o, i) => {
      const style = o.style ? ' ' + o.style : '';
      html += `<button class="opt${style}" data-next="${o.next}">
                 <span>${esc(o.label)}</span><span class="arrow">→</span>
               </button>`;
    });
    html += '</div>';
  }

  // リンク・アフィリエイト
  if ((node.links && node.links.length) || node.affiliate) {
    html += '<div class="extras">';
    if (node.links) {
      node.links.forEach((l) => {
        html += `<a class="ext-link" href="${esc(l.url)}" target="_blank" rel="noopener noreferrer">
                   <span class="lab">↗</span>${esc(l.label)}</a><br>`;
      });
    }
    if (node.affiliate) {
      const a = node.affiliate;
      html += `<a class="affiliate" href="${esc(amazonUrl(a.keyword))}" data-track-label="${esc(a.keyword)}" target="_blank" rel="noopener sponsored nofollow">
                 🛒 ${esc(a.label)}<span class="sub">${esc(a.note || 'Amazonで探す')}</span></a>`;
    }
    html += '</div>';
  }

  html += '</div>';
  appEl.innerHTML = html;

  // イベント
  const back = document.getElementById('backBtn');
  if (back) back.addEventListener('click', goBack);
  appEl.querySelectorAll('.opt').forEach((btn) => {
    btn.addEventListener('click', () => {
      go(current.treeId, btn.getAttribute('data-next'), true);
    });
  });
}

function goBack() {
  if (stack.length) {
    const prev = stack.pop();
    current = prev;
    const tree = TREES[prev.treeId];
    renderNode(tree, tree.nodes[prev.nodeId]);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    goHome();
  }
}

/* ---------- ルーティング（ハッシュで直リンク） ---------- */
function routeFromHash() {
  const h = location.hash.replace('#', '');
  if (h && TREES[h]) {
    lockedTree = h;
    stack = [];
    go(h, TREES[h].start, false);
  } else {
    lockedTree = null;
    renderHome();
  }
  updateFooterVisibility();
}

document.getElementById('brand').addEventListener('click', goHome);
window.addEventListener('hashchange', () => {
  // メニューのカードクリックでもhashが変わるが、その場合は既に描画済み。
  // ブラウザの戻る/進む・外部リンク流入時のみ反映する。
  const h = location.hash.replace('#', '');
  if (!h) { lockedTree = null; updateFooterVisibility(); if (current) renderHome(); return; }
  if (TREES[h] && (!current || current.treeId !== h || stack.length === 0)) {
    // 既に同じツリーの途中なら邪魔しない
    if (!current || current.treeId !== h) routeFromHash();
  }
});

/* ---------- 設定モーダル ---------- */
const modalBg = document.getElementById('modal-bg');
const tagInput = document.getElementById('tag-input');
const tagSaved = document.getElementById('tag-saved');
document.getElementById('gear').addEventListener('click', () => {
  tagInput.value = localStorage.getItem('fixit:amazonTag') || '';
  tagSaved.textContent = '';
  modalBg.classList.add('open');
});
modalBg.addEventListener('click', (e) => { if (e.target === modalBg) modalBg.classList.remove('open'); });
document.getElementById('tag-save').addEventListener('click', () => {
  const v = tagInput.value.trim();
  if (v) localStorage.setItem('fixit:amazonTag', v);
  else localStorage.removeItem('fixit:amazonTag');
  tagSaved.textContent = '保存しました';
  // 表示中ノードを再描画してリンクへ反映
  if (current) { const t = TREES[current.treeId]; renderNode(t, t.nodes[current.nodeId]); }
});
document.getElementById('tag-clear').addEventListener('click', () => {
  localStorage.removeItem('fixit:amazonTag');
  tagInput.value = '';
  tagSaved.textContent = 'クリアしました';
});

/* ---------- 起動 ---------- */
routeFromHash();

/* ---------- Service Worker ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((e) => console.warn('SW登録失敗', e));
  });
}
</script>
</body>
</html>
