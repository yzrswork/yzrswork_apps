<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>装備ナビへ移動しました -- や印工務店の道具箱</title>
<meta name="robots" content="noindex, follow" />
<meta http-equiv="refresh" content="0; url=../kit/" />
<link rel="canonical" href="https://apps.yzrswork.com/kit/" />
<link rel="stylesheet" href="/shared/tokens.css" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--jp);
    line-height: 1.6;
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 16px; text-align: center; }
  h1 { margin: 0 0 6px; font-size: 1.4rem; }
  p { margin: 0 0 20px; color: var(--muted); font-size: .92rem; }
  a.home {
    display: inline-block; text-decoration: none; background: var(--ink); color: #fff;
    padding: 12px 22px; border-radius: 10px; font-weight: 600; font-size: .9rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>装備ナビへ移動しました</h1>
  <p>このページは移動しました。数秒で自動的に切り替わります。</p>
  <a class="home" href="../kit/">装備ナビを開く</a>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (regs) {
    regs.forEach(function (r) { r.unregister(); });
  });
}
location.replace('../kit/');
</script>
</body>
</html>
