<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YZRsynth_v3.1</title>
<style>
/* ── TR-909 palette: light gray face, black chassis, orange accents,
     red step LEDs ── */
:root{
  --chassis:#161614;
  --panel:#d7d4cc;
  --panel-2:#e6e3db;
  --panel-3:#c6c3ba;
  --line:rgba(0,0,0,0.22);
  --text:#211f1b;
  --muted:#767268;
  --accent:#f07818;
  --accent-dim:rgba(240,120,24,0.18);
  --led:#e0301e;
  --led-dim:rgba(224,48,30,0.18);
  --mono:ui-monospace,'SF Mono','DM Mono',Menlo,monospace;
}
.back-btn{position:fixed;top:6px;right:14px;z-index:999;color:#8a867c;text-decoration:none;font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;}
.back-btn:hover{color:#e6e3db;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--chassis);font-family:-apple-system,"SF Pro",system-ui,sans-serif;user-select:none;-webkit-user-select:none;overscroll-behavior:none;}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#landscape-warn{display:none;position:fixed;inset:0;background:var(--panel);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text);font-size:22px;text-align:center;}
@media (orientation:landscape) and (max-height:500px){#landscape-warn{display:flex;}}
#app{flex:1;display:flex;min-height:0;}
#main{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--panel);}
/* Black top strip with the orange logo block, like the 909 fascia */
#header{height:52px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px 0;flex-shrink:0;background:var(--chassis);}
#brand{display:flex;flex-direction:column;line-height:1.2;flex-shrink:0;gap:2px;}
#brand h1{color:#161614;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:0.06em;background:var(--accent);border-radius:3px;padding:2px 8px;display:flex;align-items:center;white-space:nowrap;}
#brand .sub{color:#8a867c;font-family:var(--mono);font-size:7px;letter-spacing:0.26em;text-transform:uppercase;}
#brand h1 .dot{display:none;}
#header-tools{display:flex;gap:4px;align-items:center;}
.tool-btn{height:28px;padding:0 8px;background:#26262a;border:1px solid rgba(255,255,255,0.16);border-radius:7px;color:#a3a098;font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:0.08em;cursor:pointer;}
.tool-btn.active{border-color:var(--accent);background:rgba(240,120,24,0.22);color:#fff;}
#timbre-row{height:60px;display:flex;padding:9px 12px 5px;gap:8px;flex-shrink:0;}
.timbre-btn{flex:1;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.12em;box-shadow:0 1px 0 rgba(0,0,0,0.15);transition:border-color 0.12s,color 0.12s,background 0.12s;}
.timbre-btn:active{transform:scale(0.97);}
.timbre-btn .led{width:5px;height:5px;border-radius:50%;background:rgba(0,0,0,0.18);transition:background 0.12s,box-shadow 0.12s;}
.timbre-btn.active{border-color:var(--accent);color:var(--text);background:var(--accent-dim);}
.timbre-btn.active .led{background:var(--led);box-shadow:0 0 6px var(--led);}
#knobs-row{height:148px;display:flex;padding:6px 12px;gap:4px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);flex-shrink:0;align-items:center;justify-content:space-around;}
.knob-col{display:flex;flex-direction:column;align-items:center;gap:3px;width:70px;}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:70px;}
.knob{width:54px;height:54px;cursor:pointer;touch-action:none;}
.knob-label{color:var(--muted);font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.14em;}
.arp-notes-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:70px;justify-content:center;}
.arp-notes-btns{display:flex;gap:4px;width:100%;height:26px;}
.arp-note-btn{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;}
.arp-note-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
/* ── Looper ── */
#looper-row{height:68px;display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);flex-shrink:0;}
.loop-knob-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;width:52px;}
.loop-knob-wrap .knob{width:46px;height:46px;}
.loop-knob-wrap .knob-label{font-size:7px;}
.loop-btn{height:40px;min-width:56px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.08em;cursor:pointer;flex-shrink:0;box-shadow:0 1px 0 rgba(0,0,0,0.15);}
.loop-btn:active{transform:scale(0.96);}
.loop-btn:disabled{opacity:0.4;}
#looper-rec.recording{border-color:var(--led);background:var(--led-dim);color:var(--led);animation:recpulse 0.9s infinite;}
#looper-rec.playing{border-color:rgba(0,0,0,0.4);color:var(--text);}
.loop-btn.clear{color:var(--muted);}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:0.55;}}
#looper-track{flex:1;height:40px;position:relative;background:var(--panel-3);border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;align-items:center;}
#looper-bar{position:absolute;left:0;top:0;height:100%;width:0;background:var(--accent);opacity:0.35;}
#looper-track.recording #looper-bar{background:var(--led);opacity:0.3;}
#looper-status{position:relative;z-index:1;padding:0 12px;font-family:var(--mono);font-size:10px;color:#55524a;font-weight:700;letter-spacing:0.1em;white-space:nowrap;}
/* ── Step sequencer: 909-style light keys with red LEDs ── */
#seq-row{display:flex;flex-direction:column;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line);flex-shrink:0;}
#seq-top{display:flex;align-items:center;gap:6px;}
#seq-play{min-width:44px;height:38px;}
#seq-play.playing{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
#drum-tabs{display:flex;gap:4px;flex:1;}
.drum-tab{flex:1;height:38px;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;color:var(--muted);font-family:var(--mono);font-size:9px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 1px 0 rgba(0,0,0,0.15);}
.drum-tab .tled{width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,0.15);}
.drum-tab.has-notes .tled{background:rgba(224,48,30,0.55);}
.drum-tab.active{border-color:var(--accent);background:var(--accent-dim);color:var(--text);}
.drum-tab.active .tled{background:var(--led);box-shadow:0 0 5px var(--led);}
.seq-knob-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;width:40px;}
.seq-knob-wrap .knob{width:36px;height:36px;}
.seq-knob-wrap .knob-label{font-size:7px;}
#seq-toggle{width:28px;height:38px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;flex-shrink:0;}
#seq-steps{display:flex;gap:3px;height:34px;}
.step{flex:1;border-radius:5px;border:1px solid #8d897f;background:#efece5;cursor:pointer;padding:0;position:relative;box-shadow:0 1px 0 rgba(0,0,0,0.2);}
.step::before{content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);width:6px;height:6px;border-radius:50%;background:rgba(0,0,0,0.18);}
.step.g1{background:#ddd9d0;}
.step.on{background:#f7e3d2;border-color:#c46a2a;}
.step.on::before{background:var(--led);box-shadow:0 0 7px var(--led);}
.step.playhead{box-shadow:inset 0 0 0 2px var(--accent),0 1px 0 rgba(0,0,0,0.2);}
#seq-row.collapsed #seq-steps{display:none;}
#keyboard-wrap{flex:1;position:relative;min-height:0;touch-action:none;background:var(--chassis);padding:8px 8px calc(8px + env(safe-area-inset-bottom)/2);}
#keyboard{width:100%;height:100%;position:relative;display:flex;gap:3px;}
#keyboard.pad-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:6px;}
.white-key{flex:1;background:#f4f2ec;border-radius:7px;cursor:pointer;transition:background 0.05s;}
.white-key.pressed{background:var(--accent);}
.black-key{position:absolute;background:#1c1c21;border:1px solid rgba(255,255,255,0.16);border-radius:0 0 7px 7px;z-index:2;cursor:pointer;top:0;transition:background 0.05s;}
.black-key.pressed{background:var(--accent);border-color:var(--accent);}
.pad-key{background:#f4f2ec;border:1px solid rgba(0,0,0,0.35);border-radius:14px;cursor:pointer;transition:background 0.05s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(0,0,0,0.3);}
.pad-key:nth-child(even){background:#e2dfd8;}
.pad-key .pl{font-family:var(--mono);font-size:18px;font-weight:700;color:#9a968c;pointer-events:none;}
.pad-key.pressed{background:var(--accent);}
.pad-key.pressed .pl{color:rgba(255,255,255,0.9);}
#knob-bubble{position:fixed;z-index:1000;display:none;transform:translate(-50%,-120%);background:#fffdf8;border:1px solid var(--accent);border-radius:8px;padding:5px 12px;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);pointer-events:none;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
</style>
</head>
<body>
<a class="back-btn" href="index.html">index →</a>
<div id="landscape-warn">
  <div style="font-size:44px">📱</div>
  <div>縦にしてね</div>
</div>
<div id="app">
  <div id="main">
    <div id="header">
      <div id="brand">
        <span class="sub">Rhythm Composer</span>
        <h1>YZRsynth_v3.1<span class="dot"></span></h1>
      </div>
      <div id="header-tools">
        <button class="tool-btn scale-btn active" data-scale="free">FREE</button>
        <button class="tool-btn scale-btn" data-scale="penta">PENTA</button>
        <button class="tool-btn scale-btn" data-scale="major">MAJ</button>
        <button class="tool-btn" id="btn-glide">GLIDE</button>
      </div>
    </div>
    <div id="timbre-row">
      <button class="timbre-btn active" id="tb-chip" data-timbre="0"><span class="led"></span><span>CHIP</span></button>
      <button class="timbre-btn" id="tb-bell" data-timbre="1"><span class="led"></span><span>BELL</span></button>
      <button class="timbre-btn" id="tb-piano" data-timbre="2"><span class="led"></span><span>PIANO</span></button>
      <button class="timbre-btn" id="tb-pad" data-timbre="3"><span class="led"></span><span>PAD</span></button>
      <button class="timbre-btn" id="tb-acid" data-timbre="4"><span class="led"></span><span>ACID</span></button>
    </div>
    <div id="knobs-row">
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-arpSpd" width="54" height="54" data-knob="arpSpd"></canvas><div class="knob-label">ARP SPD</div></div>
        <div class="arp-notes-wrap">
          <div class="knob-label">NOTES</div>
          <div class="arp-notes-btns">
            <button class="arp-note-btn" data-notes="2">2</button>
            <button class="arp-note-btn" data-notes="3">3</button>
            <button class="arp-note-btn active" data-notes="4">4</button>
          </div>
        </div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyFb" width="54" height="54" data-knob="dlyFb"></canvas><div class="knob-label">DLY FB</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-dlyTime" width="54" height="54" data-knob="dlyTime"></canvas><div class="knob-label">DLY TIME</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-rev" width="54" height="54" data-knob="rev"></canvas><div class="knob-label">REV</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-cho" width="54" height="54" data-knob="cho"></canvas><div class="knob-label">CHO</div></div>
      </div>
      <div class="knob-col">
        <div class="knob-wrap"><canvas class="knob" id="knob-trm" width="54" height="54" data-knob="trm"></canvas><div class="knob-label">TRM</div></div>
        <div class="knob-wrap"><canvas class="knob" id="knob-wave" width="54" height="54" data-knob="wave"></canvas><div class="knob-label">WAVE</div></div>
      </div>
    </div>
    <div id="looper-row">
      <button id="looper-rec" class="loop-btn">● REC</button>
      <div id="looper-track"><div id="looper-bar"></div><span id="looper-status">長押しで録音</span></div>
      <div class="loop-knob-wrap"><canvas class="knob" id="knob-loopSpd" width="46" height="46" data-knob="loopSpd"></canvas><div class="knob-label">SPEED</div></div>
      <button id="looper-clear" class="loop-btn clear" disabled>CLR</button>
    </div>
    <div id="seq-row">
      <div id="seq-top">
        <button id="seq-play" class="loop-btn">▶</button>
        <div id="drum-tabs"></div>
        <div class="seq-knob-wrap"><canvas class="knob" id="knob-bpm" width="36" height="36" data-knob="bpm"></canvas><div class="knob-label">BPM</div></div>
        <div class="seq-knob-wrap"><canvas class="knob" id="knob-swing" width="36" height="36" data-knob="swing"></canvas><div class="knob-label">SWG</div></div>
        <button id="seq-toggle">▾</button>
      </div>
      <div id="seq-steps"></div>
    </div>
    <div id="keyboard-wrap"><div id="keyboard"></div></div>
  </div>
</div>
<div id="knob-bubble"></div>

<script>
'use strict';

// ── Audio ───────────────────────────────────────────────────────
let audioCtx = null;
// Effect buses
let masterGain, compressorNode;
let reverbConv, reverbWetGain, reverbDryGain;
let delayNode, delayFBGain, delayWetGain, delayDryGain;
let chorusDelayNode, chorusLFO, chorusWetGain, chorusDryGain;
// Voice output bus (all voices connect here)
let voiceBusGain;
// Tremolo
let tremoloGain, tremoloLFO, tremoloDepthGain;
// Drums
let drumGain, noiseBuffer;
// Looper (separate output bus for recorded audio)
let recSink, loopGain, loopComp;

function buildIR(ctx, dur) {
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 3);
  }
  return buf;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.8;
  compressorNode = audioCtx.createDynamicsCompressor();
  compressorNode.threshold.value = -12; compressorNode.ratio.value = 8;
  compressorNode.attack.value = 0.003; compressorNode.release.value = 0.25;
  masterGain.connect(compressorNode);
  compressorNode.connect(audioCtx.destination);

  // Reverb section
  reverbConv = audioCtx.createConvolver(); reverbConv.buffer = buildIR(audioCtx, 2.0);
  reverbWetGain = audioCtx.createGain(); reverbWetGain.gain.value = 0;
  reverbDryGain = audioCtx.createGain(); reverbDryGain.gain.value = 1;
  reverbConv.connect(reverbWetGain); reverbWetGain.connect(masterGain);
  reverbDryGain.connect(masterGain);

  // Delay section
  delayNode = audioCtx.createDelay(2.0); delayNode.delayTime.value = 0.05 + 0.30*0.95;
  delayFBGain = audioCtx.createGain(); delayFBGain.gain.value = 0;
  delayWetGain = audioCtx.createGain(); delayWetGain.gain.value = 0;
  delayDryGain = audioCtx.createGain(); delayDryGain.gain.value = 1;
  delayNode.connect(delayFBGain); delayFBGain.connect(delayNode);
  delayNode.connect(delayWetGain);
  delayWetGain.connect(reverbDryGain); delayWetGain.connect(reverbConv);
  delayDryGain.connect(reverbDryGain); delayDryGain.connect(reverbConv);

  // Chorus section
  chorusDelayNode = audioCtx.createDelay(0.1); chorusDelayNode.delayTime.value = 0.030;
  chorusLFO = audioCtx.createOscillator(); chorusLFO.type = 'sine'; chorusLFO.frequency.value = 0.5;
  const chorusDepth = audioCtx.createGain(); chorusDepth.gain.value = 0.005;
  chorusLFO.connect(chorusDepth); chorusDepth.connect(chorusDelayNode.delayTime); chorusLFO.start();
  chorusWetGain = audioCtx.createGain(); chorusWetGain.gain.value = 0;
  chorusDryGain = audioCtx.createGain(); chorusDryGain.gain.value = 1;
  chorusDelayNode.connect(chorusWetGain);
  chorusWetGain.connect(delayDryGain); chorusWetGain.connect(delayNode);
  chorusDryGain.connect(delayDryGain); chorusDryGain.connect(delayNode);

  // Voice bus
  voiceBusGain = audioCtx.createGain(); voiceBusGain.gain.value = 1;

  // Tremolo: LFO modulates tremoloGain.gain, inserted between voiceBus and chorus
  tremoloGain = audioCtx.createGain();
  tremoloGain.gain.value = 1.0;
  tremoloLFO = audioCtx.createOscillator();
  tremoloLFO.type = 'sine';
  tremoloLFO.frequency.value = 0.5;
  tremoloDepthGain = audioCtx.createGain();
  tremoloDepthGain.gain.value = 0;
  tremoloLFO.connect(tremoloDepthGain);
  tremoloDepthGain.connect(tremoloGain.gain);
  tremoloLFO.start();

  voiceBusGain.connect(tremoloGain);
  tremoloGain.connect(chorusDryGain);
  tremoloGain.connect(chorusDelayNode);

  // Drum bus: dry, straight into the master (skips delay/reverb so the
  // beat stays punchy). It passes the live compressor, so the looper can
  // record drums together with the keyboard.
  drumGain = audioCtx.createGain(); drumGain.gain.value = 0.9;
  drumGain.connect(masterGain);
  noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
  const nd = noiseBuffer.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;

  // ── Looper: SEPARATE output bus for the recorded loop ──────────
  // The recorded loop plays through its own gain → its own compressor →
  // destination, completely independent from the live (realtime) path.
  // This way the loop's speed/pitch and overdub layers never disturb the
  // live keyboard signal, and the two are mixed only at the speakers.
  loopGain = audioCtx.createGain(); loopGain.gain.value = 1;
  loopComp = audioCtx.createDynamicsCompressor();
  loopComp.threshold.value = -14; loopComp.ratio.value = 6;
  loopComp.attack.value = 0.003; loopComp.release.value = 0.25;
  loopGain.connect(loopComp);
  loopComp.connect(audioCtx.destination);

  recSink = audioCtx.createGain(); recSink.gain.value = 0; // silent driver
  recSink.connect(audioCtx.destination);
  initLooperWorklet();

  // Knob values may have been restored from the URL hash before the
  // context existed — push them all onto the live nodes now.
  Object.keys(knobVals).forEach(k => applyEffect(k, knobVals[k]));
}

const startAudio = () => {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
};
document.addEventListener('touchstart', startAudio, {once:true});
document.addEventListener('click', startAudio, {once:true});

// App switch / lock screen: resume the context on return (otherwise the
// app looks frozen with no sound), and kill held notes while hidden so
// arp intervals don't keep firing in the background. The sequencer's
// lookahead also breaks under background timer throttling, so stop it.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    releaseAllNotes();
    if (looperState === 'recording') finishRecording();
    if (seqPlaying) stopSeq();
  } else if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
});

// ── Knobs ───────────────────────────────────────────────────────
const knobVals = {arpSpd:0, dlyFb:0, dlyTime:30, rev:0, cho:0, trm:0, wave:0, loopSpd:50, bpm:50, swing:0};
const KNOB_DEFAULTS = {...knobVals};

function applyEffect(name, val) {
  // Sequencer params live on the main thread — no audio context needed
  if (name === 'bpm') { bpm = 60 + (val/100)*120; return; }
  if (name === 'swing') { swing = (val/100)*0.6; return; }
  if (!audioCtx) return;
  const v = val / 100;
  switch(name) {
    case 'arpSpd':
      // value used at noteOn time
      break;
    case 'dlyFb':
      delayFBGain.gain.setTargetAtTime(Math.min(0.98, v*0.98), audioCtx.currentTime, 0.02);
      delayWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'dlyTime':
      delayNode.delayTime.setTargetAtTime(0.05 + v*0.95, audioCtx.currentTime, 0.05);
      break;
    case 'rev':
      reverbWetGain.gain.setTargetAtTime(v*0.85, audioCtx.currentTime, 0.02);
      break;
    case 'cho':
      chorusWetGain.gain.setTargetAtTime(v*0.7, audioCtx.currentTime, 0.02);
      break;
    case 'trm': {
      const freq = 0.5 * Math.pow(60, v);
      const depth = v * 0.95;
      tremoloLFO.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.02);
      tremoloDepthGain.gain.setTargetAtTime(depth, audioCtx.currentTime, 0.02);
      tremoloGain.gain.setTargetAtTime(1 - depth/2, audioCtx.currentTime, 0.02);
      break;
    }
    case 'wave':
      // value used at createVoice time
      break;
    case 'loopSpd':
      // Speed & pitch move together (resampling): 0→0.5x(低速・低音)、
      // 50→1.0x(等速)、100→2.0x(高速・高音)
      loopRate = 0.5 * Math.pow(2, val/50);
      if (loopSource) loopSource.playbackRate.setTargetAtTime(loopRate, audioCtx.currentTime, 0.02);
      break;
  }
}

function knobLabel(name, val) {
  if (name === 'wave') {
    if (val < 25) return 'SIN';
    if (val < 50) return 'SQR';
    if (val < 75) return 'TRI';
    return 'SAW';
  }
  if (name === 'loopSpd') return (0.5 * Math.pow(2, val/50)).toFixed(1) + 'x';
  if (name === 'bpm') return String(Math.round(60 + (val/100)*120));
  if (name === 'swing') return Math.round((val/100)*60) + '%';
  if (name === 'dlyFb' && val === 100) return '∞';
  return Math.round(val) + '%';
}

function drawKnob(canvas, val) {
  const ctx = canvas.getContext('2d'), w=canvas.width, h=canvas.height, cx=w/2, cy=h/2, r=w/2-4;
  ctx.clearRect(0,0,w,h);
  // 909-style: gray knob body with an orange indicator
  const g = ctx.createRadialGradient(cx*.7,cy*.7,2,cx,cy,r);
  g.addColorStop(0,'#f2efe9'); g.addColorStop(1,'#bdb9b0');
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1; ctx.stroke();
  const sa=(225*Math.PI/180), span=(270*Math.PI/180);
  ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+span); ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
  if (val>0) {
    ctx.beginPath(); ctx.arc(cx,cy,r-5,sa,sa+(val/100)*span); ctx.strokeStyle='#f07818'; ctx.lineWidth=3; ctx.stroke();
  }
  const ang = (225+(val/100)*270)*Math.PI/180;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(ang)*(r-12), cy+Math.sin(ang)*(r-12));
  ctx.lineTo(cx+Math.cos(ang)*(r-4), cy+Math.sin(ang)*(r-4));
  ctx.strokeStyle='#f07818'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  ctx.fillStyle='#55524a'; ctx.font=`700 ${w<=40?7:8}px ui-monospace,monospace`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(knobLabel(canvas.dataset.knob, val), cx, cy+1);
}

const bubbleEl = document.getElementById('knob-bubble');
function showBubble(canvas, val) {
  const rect = canvas.getBoundingClientRect();
  bubbleEl.style.left = (rect.left + rect.width/2) + 'px';
  bubbleEl.style.top = rect.top + 'px';
  bubbleEl.textContent = knobLabel(canvas.dataset.knob, val);
  bubbleEl.style.display = 'block';
}
function hideBubble() { bubbleEl.style.display = 'none'; }

document.querySelectorAll('.knob').forEach(canvas => {
  const k = canvas.dataset.knob;
  drawKnob(canvas, knobVals[k]||0);
  let sy=0, sv=0, drag=false, lastTap=0;
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault(); canvas.setPointerCapture(e.pointerId);
    const now = performance.now();
    if (now - lastTap < 350) {            // double-tap → reset to default
      lastTap = 0; drag = false;
      knobVals[k] = KNOB_DEFAULTS[k] || 0;
      drawKnob(canvas, knobVals[k]); applyEffect(k, knobVals[k]);
      showBubble(canvas, knobVals[k]); setTimeout(hideBubble, 500);
      scheduleHash();
      return;
    }
    lastTap = now;
    drag=true; sy=e.clientY; sv=knobVals[k]||0;
    showBubble(canvas, sv);
  });
  canvas.addEventListener('pointermove', e => {
    if (!drag) return; e.preventDefault();
    const nv = Math.max(0, Math.min(100, sv+(sy-e.clientY)*0.8));
    knobVals[k]=nv; drawKnob(canvas,nv); applyEffect(k,nv);
    showBubble(canvas, nv);
  });
  canvas.addEventListener('pointerup', ()=>{ if(drag){drag=false; hideBubble(); scheduleHash();} });
  canvas.addEventListener('pointercancel', ()=>{ drag=false; hideBubble(); });
});

function redrawAllKnobs() {
  document.querySelectorAll('.knob').forEach(c => drawKnob(c, knobVals[c.dataset.knob]||0));
}

// ── Step sequencer (16 steps × 5 synthesized 808 drums) ─────────
const DRUM_TRACKS = ['BD','SD','CH','OH','CP'];
const drumPattern = DRUM_TRACKS.map(() => new Array(16).fill(false));
// Starter groove so the first PLAY is instantly rewarding
[0,4,8,12].forEach(i => drumPattern[0][i] = true);
[4,12].forEach(i => drumPattern[1][i] = true);
[0,2,4,6,8,10,12,14].forEach(i => drumPattern[2][i] = true);

let bpm = 120, swing = 0;                 // driven by bpm/swing knobs
let seqPlaying = false, seqStep = 0, nextStepTime = 0, seqTimer = null;
let currentDrumTrack = 0;
const stepQueue = [];                     // {step,time} for playhead UI
let playheadStep = -1;

function playDrum(track, t) {
  switch (track) {
    case 0: {  // BD: sine pitch-drop + click
      const o = audioCtx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(45, t+0.12);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.95, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.4);
      o.connect(g); g.connect(drumGain); o.start(t); o.stop(t+0.45);
      const c = audioCtx.createOscillator(); c.type = 'square'; c.frequency.value = 1200;
      const cg = audioCtx.createGain();
      cg.gain.setValueAtTime(0.18, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t+0.02);
      c.connect(cg); cg.connect(drumGain); c.start(t); c.stop(t+0.03);
      break;
    }
    case 1: {  // SD: bandpassed noise + 180Hz tone
      const n = audioCtx.createBufferSource(); n.buffer = noiseBuffer;
      const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 900;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
      n.connect(f); f.connect(g); g.connect(drumGain); n.start(t); n.stop(t+0.2);
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = 180;
      const og = audioCtx.createGain();
      og.gain.setValueAtTime(0.35, t);
      og.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      o.connect(og); og.connect(drumGain); o.start(t); o.stop(t+0.12);
      break;
    }
    case 2:    // CH: short hipassed noise
    case 3: {  // OH: same, longer decay
      const dur = track === 2 ? 0.05 : 0.35;
      const n = audioCtx.createBufferSource(); n.buffer = noiseBuffer;
      const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      n.connect(f); f.connect(g); g.connect(drumGain); n.start(t); n.stop(t+dur+0.02);
      break;
    }
    case 4: {  // CP: 3 noise bursts (classic clap spread)
      const n = audioCtx.createBufferSource(); n.buffer = noiseBuffer;
      const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1200; f.Q.value = 1.2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      for (let b = 0; b < 3; b++) {
        const bt = t + b*0.015;
        g.gain.setValueAtTime(0.55, bt);
        g.gain.exponentialRampToValueAtTime(0.08, bt+0.014);
      }
      g.gain.setValueAtTime(0.4, t+0.045);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
      n.connect(f); f.connect(g); g.connect(drumGain); n.start(t); n.stop(t+0.3);
      break;
    }
  }
}

// Lookahead scheduler ("A Tale of Two Clocks"): the interval callback only
// books events ~0.12s ahead on the audio clock; no audio work happens here.
function scheduleSeq() {
  while (nextStepTime < audioCtx.currentTime + 0.12) {
    const stepDur = 60/bpm/4;
    let t = nextStepTime;
    if (seqStep % 2 === 1) t += stepDur * swing;   // swing the off-16ths
    drumPattern.forEach((tr, i) => { if (tr[seqStep]) playDrum(i, t); });
    stepQueue.push({step: seqStep, time: t});
    nextStepTime += stepDur;
    seqStep = (seqStep + 1) % 16;
  }
}

function startSeq() {
  startAudio();
  if (!audioCtx || seqPlaying) return;
  seqPlaying = true;
  seqStep = 0;
  nextStepTime = audioCtx.currentTime + 0.06;
  scheduleSeq();
  seqTimer = setInterval(scheduleSeq, 25);
  seqPlayBtn.classList.add('playing');
  seqPlayBtn.textContent = '■';
}

function stopSeq() {
  seqPlaying = false;
  if (seqTimer) { clearInterval(seqTimer); seqTimer = null; }
  stepQueue.length = 0;
  setPlayhead(-1);
  seqPlayBtn.classList.remove('playing');
  seqPlayBtn.textContent = '▶';
}

// Sequencer UI
const seqPlayBtn = document.getElementById('seq-play');
const drumTabsEl = document.getElementById('drum-tabs');
const seqStepsEl = document.getElementById('seq-steps');
const stepEls = [], tabEls = [];

DRUM_TRACKS.forEach((name, i) => {

});

refreshSteps();

function setPlayhead(step) {
  if (playheadStep >= 0) stepEls[playheadStep].classList.remove('playhead');
  playheadStep = step;
  if (step >= 0) stepEls[step].classList.add('playhead');
}

seqPlayBtn.addEventListener('click', () => seqPlaying ? stopSeq() : startSeq());

seqToggleBtn.addEventListener('click', () => {

// ── Looper (hold-to-overdub, separate output bus) ───────────────
// Loop length is set when a fresh loop is recorded: 2 bars at the current
// BPM knob (overdubs always reuse the existing loop's length).
let loopSeconds = 4;
let looperState = 'idle';   // 'idle' | 'recording' | 'waiting' | 'playing'
let loopBuffer = null, loopSource = null, loopStartTime = 0;
let undoBuffer = null;      // the loop as it was before the last take
let loopRate = 1.0;         // playbackRate (speed & pitch linked)
let recHadLoop = false;     // true → this take is an overdub
let recStartTime = 0, recTotal = 0;

// Recording runs in an AudioWorklet so the per-sample overdub loop lives
// on the audio thread — zero main-thread cost (the old ScriptProcessor
// pumped buffers through the main thread and caused jank). Old Safari
// (<14.1) falls back to a ScriptProcessor connected only while recording.
const LOOPER_WORKLET_CODE = `
class LooperProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this.recording = false; this.bufL = null; this.bufR = null;
    this.pos = 0; this.total = 0;
    this.port.onmessage = e => {
      const m = e.data;
      if (m.cmd === 'start') {
        this.total = m.total;
        this.bufL = m.seedL || new Float32Array(m.total);
        this.bufR = m.seedR || new Float32Array(m.total);
        this.pos = 0; this.recording = true;
      } else if (m.cmd === 'stop') {
        this.recording = false;
        const L = this.bufL, R = this.bufR;
        this.bufL = this.bufR = null;
        if (L) this.port.postMessage({cmd:'data', L, R}, [L.buffer, R.buffer]);
      }
    };
  }
  process(inputs) {
    const inp = inputs[0];
    if (this.recording && inp && inp.length) {
      const inL = inp[0], inR = inp[1] || inp[0];
      for (let i = 0; i < inL.length; i++) {
        this.bufL[this.pos] += inL[i];
        this.bufR[this.pos] += inR[i];
        if (++this.pos >= this.total) this.pos = 0;  // wrap → overdub
      }
    }
    return true;
  }
}
registerProcessor('looper-processor', LooperProcessor);
`;

let looperNode = null, workletReady = false;
let recProcessor = null, recConnected = false;   // fallback path
let recBufL = null, recBufR = null, recPos = 0;
let usingWorklet = false;

async function initLooperWorklet() {
  try {
    const url = URL.createObjectURL(new Blob([LOOPER_WORKLET_CODE], {type:'application/javascript'}));
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    looperNode = new AudioWorkletNode(audioCtx, 'looper-processor',
      {numberOfInputs:1, numberOfOutputs:1, outputChannelCount:[2]});
    looperNode.port.onmessage = onWorkletMessage;
    // Permanently in the graph; idle cost on the audio thread is negligible
    compressorNode.connect(looperNode);
    looperNode.connect(recSink);
    workletReady = true;
  } catch (e) {
    workletReady = false;   // fallback created lazily in startRecording
  }
}

function onWorkletMessage(e) {
  if (e.data.cmd !== 'data' || looperState !== 'waiting') return;
  bakeLoop(e.data.L, e.data.R);
}

function bakeLoop(L, R) {
  // Soft-clip so stacked overdubs stay bounded (still gritty = chaos OK)
  for (let i = 0; i < L.length; i++) {
    L[i] = Math.tanh(L[i]);
    R[i] = Math.tanh(R[i]);
  }
  undoBuffer = loopBuffer;   // one level of take undo
  loopBuffer = audioCtx.createBuffer(2, L.length, audioCtx.sampleRate);
  loopBuffer.copyToChannel(L, 0);
  loopBuffer.copyToChannel(R, 1);
  looperState = 'playing';
  startLoopPlayback();
  updateLooperUI();
}

// ScriptProcessor fallback (pre-14.1 Safari)
function ensureFallbackProcessor() {
  if (recProcessor) return;
  recProcessor = audioCtx.createScriptProcessor(4096, 2, 2);
  recProcessor.onaudioprocess = e => {
    if (looperState !== 'recording') return;
    const inBuf = e.inputBuffer;
    const inL = inBuf.getChannelData(0);
    const inR = inBuf.numberOfChannels > 1 ? inBuf.getChannelData(1) : inL;
    for (let i = 0; i < inL.length; i++) {
      recBufL[recPos] += inL[i];
      recBufR[recPos] += inR[i];
      if (++recPos >= recTotal) recPos = 0;
    }
  };
}

const recBtn = document.getElementById('looper-rec');
const clrBtn = document.getElementById('looper-clear');
const trackEl = document.getElementById('looper-track');
const barEl = document.getElementById('looper-bar');
const statusEl = document.getElementById('looper-status');

function stopLoopSource() {
  if (loopSource) {
    try { loopSource.stop(); } catch(e) {}
    try { loopSource.disconnect(); } catch(e) {}
    loopSource = null;
  }
}

function startLoopPlayback() {
  if (!loopBuffer || !audioCtx) return;
  stopLoopSource();
  loopSource = audioCtx.createBufferSource();
  loopSource.buffer = loopBuffer;
  loopSource.loop = true;
  loopSource.playbackRate.value = loopRate;   // speed/pitch
  loopSource.connect(loopGain);
  loopStartTime = audioCtx.currentTime;
  loopSource.start();
}

function startRecording() {
  startAudio();
  if (!audioCtx) return;
  if (looperState === 'recording' || looperState === 'waiting') return;
  recTotal = loopBuffer ? loopBuffer.length
           : Math.floor(audioCtx.sampleRate * (60/bpm) * 8);   // 2 bars
  loopSeconds = recTotal / audioCtx.sampleRate;
  recHadLoop = !!loopBuffer;
  recStartTime = audioCtx.currentTime;
  usingWorklet = workletReady;
  if (usingWorklet) {
    // Overdub: seed the worklet buffer with the existing loop so it is
    // preserved and layered. The old loop keeps playing audibly meanwhile.
    let seedL = null, seedR = null;
    if (loopBuffer) {
      seedL = new Float32Array(recTotal);
      seedR = new Float32Array(recTotal);
      seedL.set(loopBuffer.getChannelData(0).subarray(0, recTotal));
      seedR.set(loopBuffer.getChannelData(1).subarray(0, recTotal));
    }
    looperNode.port.postMessage(
      {cmd:'start', total:recTotal, seedL, seedR},
      seedL ? [seedL.buffer, seedR.buffer] : []);
  } else {
    ensureFallbackProcessor();
    recBufL = new Float32Array(recTotal);
    recBufR = new Float32Array(recTotal);
    if (loopBuffer) {
      recBufL.set(loopBuffer.getChannelData(0).subarray(0, recTotal));
      recBufR.set(loopBuffer.getChannelData(1).subarray(0, recTotal));
    }
    recPos = 0;
    if (!recConnected) {
      compressorNode.connect(recProcessor);
      recProcessor.connect(recSink);
      recConnected = true;
    }
  }
  looperState = 'recording';
  updateLooperUI();
}

function finishRecording() {
  if (looperState !== 'recording') return;
  if (usingWorklet) {
    looperState = 'waiting';            // baked when the worklet posts back
    looperNode.port.postMessage({cmd:'stop'});
  } else {
    if (recConnected) {
      try { compressorNode.disconnect(recProcessor); } catch(e) {}
      try { recProcessor.disconnect(recSink); } catch(e) {}
      recConnected = false;
    }
    looperState = 'waiting';
    bakeLoop(recBufL, recBufR);
    recBufL = recBufR = null;
  }
}

function clearLoop() {
  // If a take is still rolling, stop the recorder; its data message is
  // ignored because the state is no longer 'waiting'.
  if (looperState === 'recording') {
    if (usingWorklet && looperNode) looperNode.port.postMessage({cmd:'stop'});
    else if (recConnected) {
      try { compressorNode.disconnect(recProcessor); } catch(e) {}
      try { recProcessor.disconnect(recSink); } catch(e) {}
      recConnected = false;
    }
  }
  stopLoopSource();
  loopBuffer = null;
  undoBuffer = null;
  looperState = 'idle';
  updateLooperUI();
}

function undoTake() {
  if (!undoBuffer) { clearLoop(); return; }
  loopBuffer = undoBuffer;
  undoBuffer = null;
  startLoopPlayback();
  updateLooperUI();
}

function updateLooperUI() {
  recBtn.classList.toggle('recording', looperState === 'recording');
  recBtn.classList.toggle('playing', looperState === 'playing');
  clrBtn.disabled = (looperState === 'idle');
  clrBtn.textContent = undoBuffer ? 'UNDO' : 'CLR';
  trackEl.classList.toggle('recording', looperState === 'recording');
  if (looperState === 'idle') {
    recBtn.textContent = '● REC';
    barEl.style.width = '0%';
    statusEl.textContent = '長押しで録音';
  } else if (looperState === 'recording') {
    recBtn.textContent = '■ REC';
  } else {
    recBtn.textContent = '● DUB';
    statusEl.textContent = 'LOOP ▶';
  }
}

// Hold to record / overdub; release (or leave) to bake the take.
recBtn.addEventListener('pointerdown', e => { e.preventDefault(); recBtn.setPointerCapture(e.pointerId); startRecording(); });
recBtn.addEventListener('pointerup', e => { e.preventDefault(); finishRecording(); });
recBtn.addEventListener('pointercancel', () => finishRecording());

// CLR: tap = undo the last take (label reads UNDO when available),
// hold 0.5s = wipe the whole loop. One button, two jobs.
let clrHoldTimer = null, clrHeld = false;
clrBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  clrHeld = false;
  clrHoldTimer = setTimeout(() => { clrHeld = true; clearLoop(); }, 500);
});
clrBtn.addEventListener('pointerup', () => {
  clearTimeout(clrHoldTimer);
  if (!clrHeld) undoTake();
});
clrBtn.addEventListener('pointercancel', () => clearTimeout(clrHoldTimer));

(function looperRAF() {
  requestAnimationFrame(looperRAF);
  if (!audioCtx) return;
  if (looperState === 'recording') {
    barEl.style.width = (((audioCtx.currentTime - recStartTime) % loopSeconds) / loopSeconds * 100) + '%';
    statusEl.textContent = recHadLoop ? '● OVERDUB' : '● REC';
  } else if (looperState === 'playing' && loopSource) {
    const dur = loopSeconds / (loopRate || 1);   // faster rate → shorter loop
    barEl.style.width = (((audioCtx.currentTime - loopStartTime) % dur) / dur * 100) + '%';
  }
  // Sequencer playhead follows the audio clock
  while (stepQueue.length && stepQueue[0].time <= audioCtx.currentTime) {
    setPlayhead(stepQueue.shift().step);
  }
})();

// ── Keyboard ────────────────────────────────────────────────────
const WHITE_NOTES = [60,62,64,65,67,69,71,72,74,76];
const BLACK_POSITIONS = [{idx:0,note:61},{idx:1,note:63},{idx:3,note:66},{idx:4,note:68},{idx:5,note:70},{idx:7,note:73},{idx:8,note:75}];
// Scale lock (ThumbJam-style): the keyboard becomes a 3×2 grid of 6 big
// pads with no wrong notes, ascending from the bottom-left.
// PENTA = A minor pentatonic, MAJ = C major.
const SCALE_NOTES = {
  penta: [57,60,62,64,67,69],
  major: [60,62,64,65,67,69]
};
let scaleMode = 'free';
const keyEls = {};
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiName(m) { return NOTE_NAMES[m%12] + (Math.floor(m/12)-1); }

function buildKeyboard() {
  const kbEl = document.getElementById('keyboard');
  kbEl.innerHTML = '';
  for (const k in keyEls) delete keyEls[k];
  kbEl.classList.toggle('pad-grid', scaleMode !== 'free');
  if (scaleMode !== 'free') {
    // Grid fills top row first, so place the upper 3 notes there and the
    // lower 3 below → pitch rises from the bottom-left like a launchpad.
    const notes = SCALE_NOTES[scaleMode];
    [3,4,5,0,1,2].forEach(i => {
      const note = notes[i];
      const el = document.createElement('div');
      el.className = 'pad-key'; el.dataset.note = note;
      const lbl = document.createElement('span');
      lbl.className = 'pl'; lbl.textContent = midiName(note);
      el.appendChild(lbl);
      kbEl.appendChild(el); keyEls[note] = el;
    });
    return;
  }
  const ww = kbEl.clientWidth || document.getElementById('keyboard-wrap').clientWidth;
  const wh = kbEl.clientHeight || document.getElementById('keyboard-wrap').clientHeight;
  const whiteW = ww / 10;
  const blackW = whiteW * 0.6, blackH = wh * 0.58;

  WHITE_NOTES.forEach(note => {
    const el = document.createElement('div');
    el.className = 'white-key'; el.dataset.note = note;
    kbEl.appendChild(el); keyEls[note] = el;
  });
  BLACK_POSITIONS.forEach(({idx, note}) => {
    const el = document.createElement('div');
    el.className = 'black-key'; el.dataset.note = note;
    el.style.cssText = `width:${blackW}px;height:${blackH}px;left:${idx*whiteW+whiteW-blackW/2}px`;
    kbEl.appendChild(el); keyEls[note] = el;
  });
}
buildKeyboard();
window.addEventListener('resize', buildKeyboard);

function setScaleMode(mode) {
  if (!SCALE_NOTES[mode] && mode !== 'free') return;
  releaseAllNotes();
  scaleMode = mode;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('active', b.dataset.scale === mode));
  buildKeyboard();
}
document.querySelectorAll('.scale-btn').forEach(btn => {
  btn.addEventListener('click', () => { setScaleMode(btn.dataset.scale); scheduleHash(); });
});

// ── Glide (portamento on finger slide) ──────────────────────────
let glideOn = false;
const glideBtn = document.getElementById('btn-glide');
glideBtn.addEventListener('click', () => {
  glideOn = !glideOn;
  glideBtn.classList.toggle('active', glideOn);
  scheduleHash();
});

// ── Voice synthesis ─────────────────────────────────────────────
function midiFreq(m) { return 440*Math.pow(2,(m-69)/12); }

const activeVoices = {};

function getEffectiveWave(timbre) {
  const w = knobVals.wave;
  if (w === 0) return null;
  if (w < 25) return 'sine';
  if (w < 50) return 'square';
  if (w < 75) return 'triangle';
  return 'sawtooth';
}

function createVoice(note, timbre) {
  if (!audioCtx) return null;
  const freq = midiFreq(note), now = audioCtx.currentTime;
  const vg = audioCtx.createGain();
  vg.connect(voiceBusGain);

  const waveOverride = getEffectiveWave(timbre);
  let o1,o2,filt;
  switch(timbre) {
    case 0:
      // CHIP: square + standard ADSR
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'square'; o1.frequency.value=freq;
      o1.connect(vg); o1.start();
      break;
    case 1: {
      // BELL: triangle + sine 2nd harmonic
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'triangle'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2;
      const hg=audioCtx.createGain(); hg.gain.value=0.25;
      o1.connect(vg); o2.connect(hg); hg.connect(vg);
      o1.start(); o2.start();
      break;
    }
    case 2: {
      // PIANO: sine fundamental + triangle 2nd harmonic, exp decay
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.7, now+0.005);
      vg.gain.exponentialRampToValueAtTime(0.0001, now+1.2);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sine'; o1.frequency.value=freq;
      o2=audioCtx.createOscillator(); o2.type='triangle'; o2.frequency.value=freq*2;
      const pg=audioCtx.createGain(); pg.gain.value=0.15;
      o1.connect(vg); o2.connect(pg); pg.connect(vg);
      o1.start(); o2.start();
      break;
    }
    case 3:
      // PAD: sine through a gentle lowpass
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sine'; o1.frequency.value=freq;
      filt=audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=2000;
      o1.connect(filt); filt.connect(vg); o1.start();
      break;
    case 4:
      // ACID: sawtooth through a resonant lowpass
      vg.gain.setValueAtTime(0.001, now);
      vg.gain.linearRampToValueAtTime(0.65, now+0.01);
      vg.gain.setTargetAtTime(0.65*0.7, now+0.16, 0.05);
      o1=audioCtx.createOscillator(); o1.type = waveOverride || 'sawtooth'; o1.frequency.value=freq;
      filt=audioCtx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=1500; filt.Q.value=4;
      o1.connect(filt); filt.connect(vg); o1.start();
      break;
  }
  return {o1,o2,filt,gain:vg,timbre};
}

function releaseVoice(v) {
  if (!v||!v.gain||!audioCtx) return;
  const now = audioCtx.currentTime;
  // Piano (timbre 2) already has natural exp decay; let it finish unless still ringing
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value, now);
  v.gain.gain.exponentialRampToValueAtTime(0.0001, now+0.3);
  setTimeout(()=>{
    try{v.o1&&v.o1.stop();}catch(e){}
    try{v.o2&&v.o2.stop();}catch(e){}
    try{v.gain.disconnect();}catch(e){}
  }, 400);
}

function noteOn(note, timbre) {
  if (!audioCtx) initAudio();
  noteOff(note);
  const arpSpd = knobVals.arpSpd;
  if (arpSpd > 0) {
    let idx = 0;
    const ms = 800 - (arpSpd - 1) * (720 / 99);
    const state = {arpInterval: null, arpVoice: null};
    const tick = () => {
      if (!activeVoices[note]) return;
      const semisLive = ARP_INTERVALS[currentArpNotes];
      const an = note + semisLive[idx % semisLive.length];
      if (state.arpVoice) releaseVoice(state.arpVoice);
      state.arpVoice = createVoice(an, timbre);
      idx++;
    };
    state.arpInterval = setInterval(tick, ms);
    activeVoices[note] = state;
    tick();
  } else {
    const v = createVoice(note, timbre);
    if (v) activeVoices[note] = v;
  }
}

function noteOff(note) {
  const v=activeVoices[note]; if (!v) return;
  if (v.arpInterval) { clearInterval(v.arpInterval); if (v.arpVoice) releaseVoice(v.arpVoice); }
  else releaseVoice(v);
  delete activeVoices[note];
}

function releaseAllNotes() {
  Object.keys(activeVoices).forEach(n => releaseKey(parseInt(n)));
  for (const id in ptrNotes) delete ptrNotes[id];
}

// Glide: retarget the running voice's oscillators instead of retriggering
function glideVoice(from, to) {
  const v = activeVoices[from];
  if (!v || !v.o1 || v.arpInterval) return false;
  noteOff(to);   // free the target slot if something is ringing there
  const f = midiFreq(to), t = audioCtx.currentTime;
  v.o1.frequency.setTargetAtTime(f, t, 0.04);
  if (v.o2) v.o2.frequency.setTargetAtTime(f*2, t, 0.04);
  delete activeVoices[from];
  activeVoices[to] = v;
  if (keyEls[from]) keyEls[from].classList.remove('pressed');
  if (keyEls[to]) keyEls[to].classList.add('pressed');
  return true;
}

// ── Keyboard interaction ─────────────────────────────────────────
const ptrNotes={};

function getNoteAt(x,y) {
  const els=document.elementsFromPoint(x,y);
  for (const el of els) if (el.dataset&&el.dataset.note) return parseInt(el.dataset.note);
  return null;
}

function pressKey(note) {
  if (!note||isNaN(note)) return;
  const el=keyEls[note]; if (el) el.classList.add('pressed');
  noteOn(note, currentTimbre);
}
function releaseKey(note) {
  if (!note||isNaN(note)) return;
  const el=keyEls[note]; if (el) el.classList.remove('pressed');
  noteOff(note);
}

const kbWrap=document.getElementById('keyboard-wrap');
kbWrap.style.touchAction='none';
kbWrap.addEventListener('pointerdown',e=>{
  e.preventDefault(); startAudio();
  const n=getNoteAt(e.clientX,e.clientY);
  if (n) { ptrNotes[e.pointerId]=n; pressKey(n); }
},{passive:false});
kbWrap.addEventListener('pointermove',e=>{
  e.preventDefault();
  const prev=ptrNotes[e.pointerId], n=getNoteAt(e.clientX,e.clientY);
  if (n===prev) return;
  if (prev && n && glideOn && glideVoice(prev, n)) {
    ptrNotes[e.pointerId]=n;
    return;
  }
  if (prev) releaseKey(prev);
  if (n) { ptrNotes[e.pointerId]=n; pressKey(n); }
  else delete ptrNotes[e.pointerId];
},{passive:false});
kbWrap.addEventListener('pointerup',e=>{ const n=ptrNotes[e.pointerId]; if(n){releaseKey(n); delete ptrNotes[e.pointerId];} });
kbWrap.addEventListener('pointercancel',e=>{ const n=ptrNotes[e.pointerId]; if(n){releaseKey(n); delete ptrNotes[e.pointerId];} });

// ── Share state via URL hash ────────────────────────────────────
const HASH_KNOBS = ['arpSpd','dlyFb','dlyTime','rev','cho','trm','wave','loopSpd','bpm','swing'];
let hashTimer = null;

function updateHashNow() {
  const ks = HASH_KNOBS.map(k => Math.round(knobVals[k]||0)).join(',');
  const p = drumPattern.map(tr => {
    let v = 0;
    tr.forEach((on, i) => { if (on) v |= 1 << i; });
    return v.toString(16).padStart(4, '0');
  }).join(',');
  const h = `k=${ks}&t=${currentTimbre}&n=${currentArpNotes}&s=${scaleMode}&g=${glideOn?1:0}&p=${p}`;
  history.replaceState(null, '', '#' + h);
}
function scheduleHash() {
  clearTimeout(hashTimer);
  hashTimer = setTimeout(updateHashNow, 300);
}

(function restoreFromHash() {
  if (!location.hash || location.hash.length < 2) return;
  try {
    const q = new URLSearchParams(location.hash.slice(1));
    if (q.has('k')) {
      q.get('k').split(',').forEach((s, i) => {
        const v = parseFloat(s);
        if (HASH_KNOBS[i] && !isNaN(v)) knobVals[HASH_KNOBS[i]] = Math.max(0, Math.min(100, v));
      });
      bpm = 60 + (knobVals.bpm/100)*120;
      swing = (knobVals.swing/100)*0.6;
      redrawAllKnobs();
    }
    if (q.has('t')) {
      const t = parseInt(q.get('t'));
      const btn = document.querySelector(`.timbre-btn[data-timbre="${t}"]`);
      if (btn) {
        document.querySelectorAll('.timbre-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTimbre = t;
      }
    }
    if (q.has('n')) {
      const n = parseInt(q.get('n'));
      const btn = document.querySelector(`.arp-note-btn[data-notes="${n}"]`);
      if (btn) {
        document.querySelectorAll('.arp-note-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentArpNotes = n;
      }
    }
    if (q.has('s')) setScaleMode(q.get('s'));
    if (q.get('g') === '1') {
      glideOn = true;
      glideBtn.classList.add('active');
    }
    if (q.has('p')) {
      q.get('p').split(',').forEach((hex, ti) => {
        if (!drumPattern[ti]) return;
        const v = parseInt(hex, 16);
        if (isNaN(v)) return;
        for (let i = 0; i < 16; i++) drumPattern[ti][i] = !!(v & (1 << i));
      });
      refreshSteps();
    }
  } catch (e) { /* malformed hash → keep defaults */ }
})();
</script>
</body>
