(function(){
var $=function(id){return document.getElementById(id)};
var sel='',selDir=false,exp=new Set(),basePath,recent,query='';

function init(){
  basePath=localStorage.getItem('vp-base')||V.base;
  recent=JSON.parse(localStorage.getItem('vp-recent')||'[]');
  $('baseInput').value=basePath;
  render();
  bindEvents();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function hi(text,q){
  if(!q)return esc(text);
  var low=text.toLowerCase(),qi=low.indexOf(q.toLowerCase());
  if(qi<0)return esc(text);
  return esc(text.slice(0,qi))+'<mark>'+esc(text.slice(qi,qi+q.length))+'</mark>'+esc(text.slice(qi+q.length));
}

function matches(node,q){
  if(!q)return true;
  var low=q.toLowerCase();
  if(node.n.toLowerCase().indexOf(low)>=0)return true;
  if(node.d&&node.d.toLowerCase().indexOf(low)>=0)return true;
  if(node.c){for(var i=0;i<node.c.length;i++){if(matches(node.c[i],low))return true}}
  return false;
}

function buildTree(nodes,prefix){
  var h='';
  for(var i=0;i<nodes.length;i++){
    var nd=nodes[i],isDir=Array.isArray(nd.c),path=prefix?prefix+'/'+nd.n:nd.n;
    if(query&&!matches(nd,query))continue;
    var opened=query?true:exp.has(path);
    var isSel=sel===path;
    var hasKids=isDir&&nd.c.length>0;

    h+='<li><div class="row'+(isSel?' sel':'')+'" data-p="'+esc(path)+'" data-d="'+(isDir?'1':'0')+'"'
      +' title="'+(isDir?esc(basePath+'/'+path+'/'):esc(basePath+'/'+path))+'">';

    if(hasKids){
      h+='<span class="arr">'+(opened?'▼':'▶')+'</span>';
    } else if(isDir){
      h+='<span class="arr empty">▶</span>';
    } else {
      h+='<span class="arr">–</span>';
    }

    h+='<span class="nm">'+hi(nd.n,query);
    if(isDir)h+='<span class="dir-mark">/</span>';
    h+='</span>';

    if(nd.d)h+='<span class="ds">'+hi(nd.d,query)+'</span>';
    h+='</div>';

    if(hasKids){
      h+='<ul class="tl"'+(opened?'':' hidden')+'>';
      h+=buildTree(nd.c,path);
      h+='</ul>';
    }
    h+='</li>';
  }
  return h;
}

function render(){
  var html=buildTree(V.tree,'');
  if(!html){
    $('tree').innerHTML='<div class="empty-msg">一致するパスがありません</div>';
  } else {
    $('tree').innerHTML='<ul class="tl">'+html+'</ul>';
  }
  updateBar();
  renderRecent();
}

function updateBar(){
  var bar=$('bar');
  if(!sel){bar.classList.remove('show');return}
  bar.classList.add('show');
  var display=sel+(selDir?'/':'');
  $('barPath').textContent=display;
}

function renderRecent(){
  var el=$('recent');
  if(!recent.length){el.hidden=true;return}
  el.hidden=false;
  var h='<div class="rec-label">最近コピーしたパス</div><div class="rec-row">';
  for(var i=0;i<recent.length;i++){
    h+='<button class="rec-item" data-rp="'+esc(recent[i])+'">'+esc(recent[i])+'</button>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function addRecent(path){
  recent=[path].concat(recent.filter(function(p){return p!==path})).slice(0,8);
  localStorage.setItem('vp-recent',JSON.stringify(recent));
  renderRecent();
}

function doCopy(text,label){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      showToast(label);addRecent(text);
    },function(){fallbackCopy(text,label)});
  } else {
    fallbackCopy(text,label);
  }
}

function fallbackCopy(text,label){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast(label);addRecent(text)}catch(e){}
  document.body.removeChild(ta);
}

function showToast(label){
  var t=$('toast');
  t.textContent=label+'をコピーしました';
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.classList.remove('show')},1800);
}

function expandAll(){
  function walk(nodes,prefix){
    for(var i=0;i<nodes.length;i++){
      var nd=nodes[i],path=prefix?prefix+'/'+nd.n:nd.n;
      if(Array.isArray(nd.c)&&nd.c.length>0){exp.add(path);walk(nd.c,path)}
    }
  }
  walk(V.tree,'');render();
}

function collapseAll(){exp.clear();render()}

function bindEvents(){
  $('tree').addEventListener('click',function(e){
    var row=e.target.closest('.row');
    if(!row)return;
    var path=row.dataset.p,isDir=row.dataset.d==='1';
    sel=path;selDir=isDir;
    if(isDir){
      if(exp.has(path))exp.delete(path);else exp.add(path);
    }
    render();
  });

  $('recent').addEventListener('click',function(e){
    var btn=e.target.closest('.rec-item');
    if(!btn)return;
    var rp=btn.dataset.rp;
    doCopy(rp,'パス');
  });

  $('search').addEventListener('input',function(e){
    query=e.target.value.trim();render();
  });

  $('btnExpand').addEventListener('click',expandAll);
  $('btnCollapse').addEventListener('click',collapseAll);

  $('btnAbs').addEventListener('click',function(){
    if(!sel)return;
    doCopy(basePath+'/'+sel+(selDir?'/':''),'絶対パス');
  });
  $('btnRel').addEventListener('click',function(){
    if(!sel)return;
    doCopy(sel+(selDir?'/':''),'相対パス');
  });

  $('cfgToggle').addEventListener('click',function(){
    var p=$('cfgPanel');
    p.hidden=!p.hidden;
    $('cfgToggle').textContent=(p.hidden?'+ ':'- ')+'ベースパス設定';
  });

  $('baseSave').addEventListener('click',function(){
    var v=$('baseInput').value.trim().replace(/\/+$/,'');
    if(!v)return;
    basePath=v;
    localStorage.setItem('vp-base',basePath);
    showToast('ベースパス');
    render();
  });

  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){
      e.preventDefault();$('search').focus();
    }
  });
}

init();
})();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}
</script>
</body>
</html>
